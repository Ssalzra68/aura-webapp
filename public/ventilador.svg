<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ventiladorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo circular -->
  <circle cx="256" cy="256" r="240" fill="url(#ventiladorGradient)" opacity="0.3"/>
  <circle cx="256" cy="256" r="220" fill="url(#ventiladorGradient)" opacity="0.2"/>
  
  <!-- Círculo principal del ventilador -->
  <circle cx="256" cy="256" r="180" fill="#60a5fa"/>
  <circle cx="256" cy="256" r="170" fill="#3b82f6"/>
  
  <!-- Aspas del ventilador -->
  <!-- Aspa 1 (arriba) -->
  <ellipse cx="256" cy="120" rx="45" ry="70" fill="white" opacity="0.9"/>
  
  <!-- Aspa 2 (derecha abajo) -->
  <g transform="rotate(120 256 256)">
    <ellipse cx="256" cy="120" rx="45" ry="70" fill="white" opacity="0.8"/>
  </g>
  
  <!-- Aspa 3 (izquierda abajo) -->
  <g transform="rotate(240 256 256)">
    <ellipse cx="256" cy="120" rx="45" ry="70" fill="white" opacity="0.7"/>
  </g>
  
  <!-- Centro del ventilador -->
  <circle cx="256" cy="256" r="25" fill="#0284c7"/>
  <circle cx="256" cy="256" r="18" fill="white" opacity="0.4"/>
  
  <!-- Detalles decorativos -->
  <circle cx="180" cy="100" r="8" fill="white" opacity="0.4"/>
  <circle cx="320" cy="160" r="6" fill="white" opacity="0.3"/>
  <circle cx="350" cy="280" r="7" fill="white" opacity="0.3"/>
  <circle cx="300" cy="380" r="8" fill="white" opacity="0.4"/>
  <circle cx="160" cy="340" r="6" fill="white" opacity="0.3"/>
</svg>
